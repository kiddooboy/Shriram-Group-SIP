# /etc/nginx/sites-available/shriramgsip.online
# Managed by: ~/shriram-group-sip/infra/nginx.conf
# Deployed via GitHub Actions — do not edit directly on server.

# ── Redirect HTTP → HTTPS ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name shriramgsip.online www.shriramgsip.online;

    # Allow Let's Encrypt HTTP challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://shriramgsip.online$request_uri;
    }
}

# ── HTTPS main server ────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name shriramgsip.online www.shriramgsip.online;

    # SSL — issued by certbot certonly --standalone
    ssl_certificate     /etc/letsencrypt/live/shriramgsip.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shriramgsip.online/privkey.pem;

    # Modern SSL settings (replaces certbot's options-ssl-nginx.conf)
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # Canonical redirect: www → bare domain
    if ($host = www.shriramgsip.online) {
        return 301 https://shriramgsip.online$request_uri;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml font/woff2;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"           always;
    add_header X-Content-Type-Options "nosniff"             always;
    add_header X-XSS-Protection      "1; mode=block"        always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Next.js static assets (long cache) ─────────────────────────────────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_set_header Host $host;
    }

    location /favicon.ico {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=86400";
    }

    # ── All other requests → Next.js ────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # SQLite DB files — never serve directly
    location ~* \.(db|db-shm|db-wal)$ {
        deny all;
        return 404;
    }
}
