name: Deploy to EC2

# Auto-deploys on every push to main. Can also be run manually from the
# Actions tab via "Run workflow".
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd ~/shriram-group-sip

            echo "→ Pulling latest main"
            git fetch origin main
            # Stash .env.local so git reset doesn't wipe Firebase keys
            cp .env.local /tmp/.env.local.bak 2>/dev/null || true
            git reset --hard origin/main
            cp /tmp/.env.local.bak .env.local 2>/dev/null || true

            echo "→ Ensuring native build tools (for better-sqlite3)"
            sudo apt-get install -y build-essential python3-dev 2>/dev/null | tail -1 || true

            echo "→ Installing dependencies"
            npm install --no-audit --no-fund

            echo "→ Building"
            npm run build

            echo "→ Restarting app"
            pm2 restart shriram-sip --update-env || pm2 start npm --name shriram-sip -- start
            pm2 save

            echo "→ Syncing Nginx config"
            if [ -f /etc/letsencrypt/live/shriramgsip.online/fullchain.pem ]; then
              sudo cp ~/shriram-group-sip/infra/nginx.conf /etc/nginx/sites-available/shriramgsip.online
              sudo nginx -t && sudo systemctl reload nginx
              echo "✓ Nginx reloaded"
            else
              echo "⚠ SSL cert not yet issued — run infra/ec2-first-run.sh once to set up HTTPS"
            fi

            echo "✓ Deploy complete"
